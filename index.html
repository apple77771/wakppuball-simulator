<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>왁뿌볼 ASMR 시뮬레이터 (Wak-ppu-ball Simulator)</title>
  <!-- 개발 오류 실시간 화면 출력 스크립트 -->
  <script>
    window.onerror = function(msg, url, line, col, error) {
      alert("JavaScript Error:\n" + msg + "\n\nLine: " + line + "\nColumn: " + col + "\nURL: " + url);
      return false;
    };
  </script>
  <!-- SEO 메타 태그 -->
  <meta name="description" content="실제 왁뿌볼의 바삭한 깨짐과 쫀득한 점토 스크램블 반죽을 재현한 모바일 최적화 웹 ASMR 시뮬레이터">
  <meta name="keywords" content="왁뿌볼, 왁스볼, ASMR, 시뮬레이터, 스트레스 해소, 점토, 슬라임">
  <!-- 모바일 줌 및 스크롤 차단 최적화 뷰포트 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- 웹앱 전체화면 설정 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- 구글 폰트 (Outfit & Noto Sans KR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- CSS 연결 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 전체 컨테이너 -->
  <main id="app-container">
    
    <!-- 상단 HUD 제어 헤더 -->
    <header id="hud-header">
      <div class="logo-area">
        <h1>WAK-PPU-BALL</h1>
        <span class="sub-logo">ASMR Simulator</span>
      </div>
      
      <!-- 컨트롤 버튼들 -->
      <div class="control-panel">
        <!-- 음소거 토글 버튼 -->
        <button id="btn-audio-toggle" class="hud-btn active" aria-label="음소거 토글" title="사운드 켜기/끄기">
          <svg class="icon" viewBox="0 0 24 24" width="20" height="20">
            <path id="icon-audio-path" fill="currentColor" d="M12 2L6.5 7.5H2v9h4.5L12 22V2zm4.5 10c0-1.8-1-3.3-2.5-4.1v8.2c1.5-.8 2.5-2.3 2.5-4.1zm.5-6.5c2.3 1.5 4 4.1 4 7s-1.7 5.5-4 7v-1.6c1.4-1.2 2.4-3 2.4-5.4s-1-4.2-2.4-5.4V5.5z"/>
          </svg>
        </button>
        <!-- 햅틱 진동 토글 버튼 -->
        <button id="btn-haptic-toggle" class="hud-btn active" aria-label="진동 토글" title="진동 켜기/끄기">
          <svg class="icon" viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-12S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-13.5l6 3.5-6 3.5v-7zm0 9l6 3.5-6 3.5v-7z"/>
          </svg>
        </button>
        <!-- 리셋 버튼 -->
        <button id="btn-reset" class="hud-btn reset-btn" aria-label="왁뿌볼 리셋" title="새 볼 꺼내기">
          <svg class="icon" viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 인터랙티브 중앙 시뮬레이션 영역 -->
    <section id="simulation-viewport" class="viewport-area">
      <!-- 캔버스 엘리먼트 -->
      <canvas id="physics-canvas"></canvas>
      
      <!-- 안내 오버레이 (첫 인터랙션 촉진) -->
      <div id="interaction-guide" class="guide-overlay">
        <div class="finger-animation"></div>
        <p id="guide-text">꾹 누르고 문질러서 왁뿌볼을 으깨보세요!</p>
      </div>
      
      <!-- 볼 상태 정보 플로팅 배치 -->
      <div id="ball-status-card" class="status-floating-card">
        <span id="status-title" class="status-badge">준비 완료</span>
        <span id="ball-name-display" class="ball-name">청사과 아삭 왁뿌</span>
      </div>
    </section>

    <!-- 하단 왁뿌볼 스킨 카테고리 카드 덱 -->
    <footer id="skin-selection-footer">
      <div class="deck-scroll-container">
        
        <!-- 카드 1: 청사과 왁뿌 -->
        <button class="skin-card active" data-skin="green-apple" id="card-green-apple">
          <div class="skin-thumbnail apple-thumb">
            <div class="inner-liquid"></div>
            <div class="mini-apples"></div>
          </div>
          <div class="skin-info">
            <span class="skin-title">청사과 아삭</span>
            <span class="skin-desc">대형 파편 & 세로 쪼개짐</span>
          </div>
        </button>

        <!-- 카드 2: 3레이어 버터 왁뿌 -->
        <button class="skin-card" data-skin="butter-stick" id="card-butter-stick">
          <div class="skin-thumbnail butter-thumb">
            <div class="butter-label">BUTTER</div>
          </div>
          <div class="skin-info">
            <span class="skin-title">3레이어 버터</span>
            <span class="skin-desc">석고 껍질 벗겨내기</span>
          </div>
        </button>

        <!-- 카드 3: 크리스피 미니 왁볼 -->
        <button class="skin-card" data-skin="mini-balloon" id="card-mini-balloon">
          <div class="skin-thumbnail balloon-thumb">
            <span class="bead pink"></span>
            <span class="bead blue"></span>
            <span class="bead yellow"></span>
          </div>
          <div class="skin-info">
            <span class="skin-title">크리스피 미니</span>
            <span class="skin-desc">풍선 속 3색 볼 개별 터뜨리기</span>
          </div>
        </button>

        <!-- 카드 4: 초코 바나나 왁뿌 -->
        <button class="skin-card" data-skin="choco-banana" id="card-choco-banana">
          <div class="skin-thumbnail choco-thumb">
            <div class="inner-banana"></div>
          </div>
          <div class="skin-info">
            <span class="skin-title">초코 바나나</span>
            <span class="skin-desc">거미줄 균열 & 쫀득 흙반죽</span>
          </div>
        </button>

      </div>
    </footer>

  </main>
  
  <!-- JavaScript 연결 -->
  <script src="app.js?v=4"></script>
</body>
</html>

name: 버그 제보
description: 재현 가능한 오류를 알려주세요.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 설명
      description: 어떤 문제가 발생했는지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 문제가 발생하기까지의 순서를 적어주세요.
      placeholder: |
        1. 페이지를 연다
        2. 재질을 선택한다
        3. 화면을 길게 누른다
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 실행 환경
      description: 기기, 운영체제, 브라우저와 버전을 적어주세요.
      placeholder: "예: Galaxy S24 / Android 15 / Chrome 136"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 추가 자료
      description: 스크린샷, 영상 또는 오류 메시지가 있다면 첨부해 주세요.
